book:
  title: Peter der Erste
  subtitle: Buch 1
  author: Alexei Tolstoi
  translator: Motivatier 2025
  language: de-DE
  publisher: ''
  rights: ''
  description: >-
    Peter der Erste erzählt vom Aufstieg eines Herrschers, der Russland mit
    Gewalt, Willenskraft und visionärer Unruhe aus der alten Welt in die
    Moderne stößt. Alexei Tolstoi zeichnet Peter nicht als entrückten
    Monarchen, sondern als rastlosen, widersprüchlichen Menschen: roh und
    genial, grausam und neugierig, maßlos in seinem Ehrgeiz und doch getrieben
    von der Überzeugung, ein rückständiges Reich neu erschaffen zu müssen.

    Vor dem Hintergrund von Machtkämpfen, Hofintrigen, Krieg, Reformen und
    persönlicher Härte entsteht das Panorama eines Landes im Umbruch. Das alte
    Moskowien mit seinen Bojaren, Traditionen und religiösen Gewissheiten
    trifft auf den ungestümen Willen eines Zaren, der Schiffe bauen, Städte
    gründen, Armeen modernisieren und Russland nach Europa öffnen will - koste
    es, was es wolle.

    Tolstois historischer Roman ist zugleich Herrscherporträt,
    Gesellschaftsepos und dramatische Erzählung über den Preis des
    Fortschritts. Peter erscheint als Revolutionär auf dem Thron: ein Mann, der
    sein Land nach vorn peitscht und dabei Menschen, Gegner und sich selbst
    verbraucht. Ein kraftvoller Roman über Macht, Modernisierung und die Frage,
    ob ein Staat erneuert werden kann, ohne an seiner eigenen Brutalität zu
    zerbrechen.
