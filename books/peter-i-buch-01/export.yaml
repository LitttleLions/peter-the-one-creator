  author_bio: >-
    Alexei Nikolajewitsch Tolstoi (1883-1945) zählt zu den bekanntesten
    russisch-sowjetischen Schriftstellern des 20. Jahrhunderts. Er schrieb
    Romane, Erzählungen, Theaterstücke, Science-Fiction und Kinderliteratur. Zu
    seinen wichtigsten Werken gehören "Aelita", "Der Hyperboloid des Ingenieurs
    Garin", die Romantrilogie "Der Leidensweg" sowie sein großer historischer
    Roman "Peter der Erste".

    In "Peter der Erste" schildert Tolstoi den Aufstieg Zar Peters I. und die
    gewaltsame Modernisierung Russlands. Der Roman verbindet historisches
    Panorama, politische Machtkämpfe und das Porträt eines Herrschers, der sein
    Land mit ungeheurer Energie nach Europa öffnen will. Peter erscheint als
    Reformator und Machtmensch zugleich - visionär, brutal, rastlos und von dem
    Willen getrieben, Russland neu zu formen.
