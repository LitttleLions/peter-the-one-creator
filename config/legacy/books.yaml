# ============================================================
# Buecher-Registry
# ============================================================
# Neue Buecher werden mit tools/init_book.py oder im Dashboard
# unter Buch-Setup registriert. Die Quelldateien in books/
# bleiben unveraendert.
# ============================================================

books:
- id: peter-i-buch-01
  title: Peter der Erste
  author: Alexei Tolstoi
  source_path: books/Peter I - Buch 01 - royallib.ru.doc
  source_lang: ru
  target_lang: de
  ruleset_path: logic/peter the one - Regeln 001.txt
  ruleset_apply: true
  style_mode: stil-03-branderson
  output_dir: output/Peter I
  status_file: status/Peter I.status.json
  log_dir: status/logs/Peter I
  naming_convention:
    style: russische Transliteration (Duden-Standard)
    example:
    - Пётр -> Peter
    - Иван -> Iwan
    - Софья -> Sofja
    - Алексей -> Alexei
    - Толстой -> Tolstoi
  notes: 'Roman in 3 Bänden von Alexei Tolstoi. Russisches Original,

    417 Seiten, ~201.000 Wörter. Buch 1 in dieser Datei.

    '
  ai:
    provider: openrouter
    model: deepseek/deepseek-v4-flash
    granularity: scene
    max_tokens_per_scene: 10000
