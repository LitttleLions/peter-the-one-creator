# ============================================================
# Pipeline-Einstellungen
# ============================================================
# Globale Parameter für den Übersetzungs-Workflow.
# ============================================================

pipeline:
  # Quellformat des Buches (rtf, docx, txt, md)
  source_format: rtf

  # Zielformat für die Übersetzung
  target_format: md   # md als Zwischenformat; später docx via Pandoc möglich

  # Ausgabeformate
  output:
    chapter_format: md
    manuscript_format: md
    manuscript_export_docx: true   # Pandoc-Aufruf zum Export nach Word

  # Encoding
  encoding_source: cp1251   # Kyrillisch in der .doc-Datei
  encoding_target: utf-8

  # Verzeichnisstruktur (relativ zum Repo-Root)
  dirs:
    config: "config"
    output: "output"
    status: "status"
    logs: "status/logs"
    tools: "tools"

  # Kapitelgrenzen-Erkennung
  chapter_detection:
    # Wir verlassen uns auf RTF-Styles (heading 1, heading 2, ...)
    # und/oder explizite Heading-Texte
    rtf_styles:
      - s1   # Heading 1 (Hauptüberschrift)
      - s2   # Heading 2 (z. B. "Книга первая")
      - s3   # Heading 3 (z. B. "Глава первая")
      - s4   # Heading 4
    heading_patterns_ru:
      - "^\\s*Книга\\s+"
      - "^\\s*Глава\\s+"
      - "^\\s*Часть\\s+"

  # Konsistenz-Checks
  consistency:
    check_names_every_n_chapters: 5
    recheck_ruleset_every_n_chapters: 5

  # ============================================================
  # KI-Aufruf-Parameter
  # ============================================================
  # Die konkreten Prompts pro Stilmodus liegen in
  # config/style_modes.yaml. Die Modus-Auswahl pro Buch liegt
  # in config/books.yaml unter `ai.style_mode` (oder dem
  # globalen Default unter `style_mode_default` in
  # config/rules-overrides.yaml).
  #
  # Pro-Buch-Overrides für Modell, Granularität und Token-Limits
  # liegen in config/books.yaml unter `ai.*`.
  #
  # Übliche Granularität:
  #   - "scene"   = Szene für Szene übersetzen (sicherer Context,
  #                 modular, gut debugbar) — Default.
  #   - "chapter" = ganzes Kapitel in einem Call (riskant bei
  #                 > 8k Wörtern, je nach Modell-Context).
  ai_defaults:
    granularity: scene
    max_tokens_per_scene: 6000
    request_timeout_sec: 180
    retry_on_5xx: true
    retry_max: 2
    retry_backoff_sec: 3
